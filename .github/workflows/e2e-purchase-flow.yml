name: E2E Purchase Flow CI

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: e2e-purchase-flow
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: Run E2E Purchase Scenarios
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - flow_name: "boosting"
            slug: "purchase-boosting-flow"
          - flow_name: "coaching"
            slug: "purchase-coaching-flow"
          - flow_name: "accounts"
            slug: "purchase-accounts-flow"
          - flow_name: "items"
            slug: "purchase-items-flow"
          - flow_name: "ggirls"
            slug: "purchase-ggirls-flow"
          - flow_name: "progames"
            slug: "purchase-pro-games-flow"

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v6

      - name: Setup Node.js env
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Playwright, Stealth
        run: |
          npm install playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps

      - name: Execute Playwright E2E Test
        run: node check-purchase-flow.js ${{ matrix.flow_name }} test-ci@example.com

      - name: Upload Failure Screenshots to Artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: purchase-failure-${{ matrix.flow_name }}
          path: failure-screenshot.png
          retention-days: 7
          if-no-files-found: ignore

      - name: Send Slack Notification on Failure
        uses: slackapi/slack-github-action@v2
        if: failure()
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚨 *E2E Purchase Flow Failure!* 🚨\nHi, an error was detected in the purchase process for product: *${{ matrix.flow_name }}*.\n\n*Repository:* ${{ github.repository }}\n*Logs & Artifacts (Screenshots):* https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }

      - name: Trigger Upptime Status Update on Failure
        if: failure()
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          event-type: uptime_failure
          client-payload: '{"slug": "${{ matrix.slug }}"}'
