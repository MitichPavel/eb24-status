name: E2E Purchase Flow CI

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: e2e-purchase-flow
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: Run E2E Purchase Scenarios
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        flow: [boosting, coaching, accounts, items, ggirls, progames]

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v6

      - name: Setup Node.js env
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Playwright & Dependencies
        run: |
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps

      - name: Execute Playwright E2E Test
        run: node check-purchase-flow.mjs ${{ matrix.flow }} test-ci@example.com false

      - name: Upload Playwright Trace Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-${{ matrix.flow }}
          path: status-data/playwright-trace-${{ matrix.flow }}.zip
          retention-days: 14

      - name: Add Report Link to Job Summary
        if: failure()
        run: |
          echo "## 🔴 Purchase Flow Failure Detected! 🚨" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The E2E monitor test failed for module: **${{ matrix.flow }}**." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 How to download and inspect the full Playwright Trace Report?" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to the **Artifacts** section at the bottom of this execution page." >> $GITHUB_STEP_SUMMARY
          echo "2. Download the **[playwright-trace-${{ matrix.flow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)** archive." >> $GITHUB_STEP_SUMMARY
          echo "3. Open your browser and navigate to: [trace.playwright.dev](https://trace.playwright.dev/)" >> $GITHUB_STEP_SUMMARY
          echo "4. Drag and drop the downloaded \`.zip\` file directly onto the page." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The report contains full video recording, browser console logs, DOM snapshots, and the absolute network traffic history (API requests/responses)." >> $GITHUB_STEP_SUMMARY

      - name: Commit and Push Status Changes
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add status-data/

          if git commit -m "chore: update purchase flow status artifacts for ${{ matrix.flow }} [skip ci]"; then
            for i in {1..5}; do
              echo "Attempt $i to push status changes..."
              git pull --rebase origin master
              if git push origin master; then
                echo "Successfully pushed status data!"
                break
              fi
              echo "Push rejected, retrying in 3 seconds..."
              sleep 3
            done
          else
            echo "No changes to commit"
          fi
