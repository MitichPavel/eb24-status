name: E2E Purchase Flow CI

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: e2e-purchase-flow
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: Run E2E Purchase Scenarios
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        flow: [boosting, coaching, accounts, items, ggirls, progames]

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js env
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Playwright & Dependencies
        run: |
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps

      - name: Execute Playwright E2E Test
        run: node check-purchase-flow.mjs ${{ matrix.flow }} test-ci@example.com false || true

      - name: Commit and Push Status Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the status-data directory
          git add status-data/

          # Commit changes if there are any
          if git commit -m "chore: update purchase flow status artifacts for ${{ matrix.flow }} [skip ci]"; then
            # Retry loop to handle concurrent pushes from matrix jobs
            for i in {1..5}; do
              echo "Attempt $i to push changes..."
              git pull --rebase origin master
              if git push origin master; then
                echo "Successfully pushed changes!"
                break
              fi
              echo "Push rejected, retrying in 3 seconds..."
              sleep 3
            done
          else
            echo "No changes to commit"
          fi
