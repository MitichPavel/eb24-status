name: E2E Purchase Flow CI

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: e2e-purchase-flow
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: Run E2E Purchase Scenarios
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        flow: [boosting, coaching, accounts, items, ggirls, progames]

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js env
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Playwright & Dependencies
        run: |
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps

      - name: Execute Playwright E2E Test
        run: node check-purchase-flow.mjs ${{ matrix.flow }} test-ci@example.com false || true

      - name: Commit and Push Status Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add status-data/
          git commit -m "chore: update purchase flow status artifacts for ${{ matrix.flow }} [skip ci]" || echo "No changes to commit"
          git push origin master
